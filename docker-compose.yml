services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: paper_backend
    env_file:
      - .env.docker
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      milvus:
        condition: service_started
      grobid:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - hf_cache:/app/hf_cache
      - /etc/localtime:/etc/localtime:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: paper_worker
    env_file:
      - .env.docker
    environment:
      - TZ=Asia/Shanghai
    command: celery -A app.workers.celery_app.celery_app worker -Q paper_tasks,celery -P solo --loglevel=info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      milvus:
        condition: service_started
      grobid:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - hf_cache:/app/hf_cache
      - /etc/localtime:/etc/localtime:ro

  frontend:
    image: nginx:1.27-alpine
    container_name: paper_frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "5173:80"   # 用户端
    volumes:
      - ./frontend/dist-user:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - backend

  admin_frontend:
    image: nginx:1.27-alpine
    container_name: paper_admin_frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8080:80"   # 管理员端
    volumes:
      - ./frontend/dist-admin:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    container_name: paper_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: literature_system
      MYSQL_USER: paper_user
      MYSQL_PASSWORD: paper_pass
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
      --wait_timeout=28800
      --interactive_timeout=28800
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-upaper_user", "-ppaper_pass"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/literature_system.sql:/docker-entrypoint-initdb.d/01_literature_system.sql:ro
      - /etc/localtime:/etc/localtime:ro

  redis:
    image: redis:7
    container_name: paper_redis
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - /etc/localtime:/etc/localtime:ro

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: paper_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - /etc/localtime:/etc/localtime:ro

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: paper_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      TZ: Asia/Shanghai
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - etcd_data:/etcd
      - /etc/localtime:/etc/localtime:ro

  milvus:
    image: milvusdb/milvus:v2.5.3
    container_name: paper_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
      - /etc/localtime:/etc/localtime:ro

  grobid:
    image: lfoppiano/grobid:0.8.2
    container_name: paper_grobid
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-XX:-UseContainerSupport
      - TZ=Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro

  flower:
    image: mher/flower:2.0
    container_name: paper_flower
    command: celery --broker=redis://redis:6379/1 flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - redis
    volumes:
      - /etc/localtime:/etc/localtime:ro

volumes:
  mysql_data:
  minio_data:
  etcd_data:
  milvus_data:
  hf_cache:
