services:

  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: paper_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: literature_system
      MYSQL_USER: paper_user
      MYSQL_PASSWORD: paper_pass
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
      --wait_timeout=28800
      --interactive_timeout=28800
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/literature_system.sql:/docker-entrypoint-initdb.d/01_literature_system.sql:ro

  redis:
    image: redis:7
    container_name: paper_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: paper_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: paper_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.5.3
    container_name: paper_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus

  grobid:
    image: lfoppiano/grobid:0.8.2
    container_name: paper_grobid
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-XX:-UseContainerSupport

  neo4j:
    image: neo4j:5.26-community
    container_name: paper_neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jadmin

    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  mysql_data:
  minio_data:
  etcd_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
